<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanjitur App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        utama: '#ffffff',
                        aksen: '#795548',
                        cokelat: { 500: '#795548', 700: '#5D4037', 900: '#3E2723' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        
        /* Fix Background & Logo Drive */
        .bg-welcome {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://lh3.googleusercontent.com/d/1Xwzd9S_wuNBv40AFeSORQsdd6JfZAwHp') center/cover no-repeat;
        }

        /* Loading Spinner Baru */
        .lds-ring { display: inline-block; position: relative; width: 40px; height: 40px; }
        .lds-ring div { box-sizing: border-box; display: block; position: absolute; width: 32px; height: 32px; margin: 4px; border: 4px solid #795548; border-radius: 50%; animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; border-color: #795548 transparent transparent transparent; }
        .lds-ring div:nth-child(1) { animation-delay: -0.45s; }
        .lds-ring div:nth-child(2) { animation-delay: -0.3s; }
        .lds-ring div:nth-child(3) { animation-delay: -0.15s; }
        @keyframes lds-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .content-section { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden">

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-welcome">
        <div class="text-center text-white px-4">
            <img src="https://lh3.googleusercontent.com/d/1H1JqgBcdkbUg0rmO022wDCospnxkDArF" alt="Logo" class="w-28 h-28 mx-auto mb-6 rounded-full shadow-2xl border-4 border-white object-cover">
            <h1 class="text-4xl font-bold mb-2">Selamat Datang</h1>
            <p class="text-lg opacity-90 mb-10">Hanjitur Wedding Dashboard</p>
            <button onclick="masukApp()" class="bg-white text-cokelat-900 px-10 py-4 rounded-full font-bold hover:scale-105 transition-transform shadow-xl">
                MULAI SEKARANG <i class="fas fa-heart ml-2 text-red-500"></i>
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-wrapper" class="hidden flex h-full">
        <!-- SIDEBAR -->
        <div id="sidebar" class="fixed md:relative z-40 inset-y-0 left-0 w-64 bg-cokelat-900 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-2xl">
            <div class="p-6 border-b border-white/10 text-xl font-bold tracking-widest">
                HANJITUR
            </div>
            <nav class="p-4 space-y-1">
                <button onclick="showSection('dashboard')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-th-large w-8 text-orange-300"></i> Dashboard</button>
                <button onclick="showSection('pernikahan')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-ring w-8 text-orange-300"></i> Pernikahan</button>
                <button onclick="showSection('keuangan')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-wallet w-8 text-orange-300"></i> Keuangan</button>
                <button onclick="showSection('catatan')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 transition"><i class="fas fa-edit w-8 text-orange-300"></i> Catatan</button>
            </nav>
        </div>

        <div class="flex-1 flex flex-col h-full overflow-hidden bg-white">
            <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
                <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                <h2 id="header-title" class="font-semibold text-gray-700">Dashboard</h2>
                <div id="current-date" class="text-xs font-medium text-gray-400"></div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Loader -->
                <div id="loader" class="hidden fixed inset-0 bg-white/60 z-[100] flex flex-col items-center justify-center">
                    <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
                    <p class="mt-2 text-sm font-semibold text-cokelat-900">Memproses...</p>
                </div>

                <!-- Section Dashboard -->
                <section id="section-dashboard" class="content-section">
                    <div class="bg-gradient-to-r from-cokelat-700 to-cokelat-900 rounded-2xl p-8 text-white shadow-lg mb-6">
                        <h2 class="text-3xl font-bold mb-2">Hello, Love! ❤️</h2>
                        <p class="opacity-80">Siap untuk hari besar kalian?</p>
                        <div class="mt-6 bg-white/20 inline-block px-6 py-3 rounded-xl backdrop-blur-sm">
                            <span id="widget-h-min" class="text-xl font-bold">---</span>
                        </div>
                    </div>
                </section>

                <!-- Section Tabel Dinamis -->
                <section id="section-tabel" class="content-section hidden">
                    <div id="sub-menu-container" class="flex gap-2 mb-6 overflow-x-auto pb-2"></div>
                    <div class="bg-white rounded-xl border shadow-sm">
                        <div class="p-4 border-b flex justify-between items-center">
                            <h3 id="table-label" class="font-bold text-gray-700 uppercase text-xs tracking-wider">Data</h3>
                            <button onclick="bukaModalForm()" class="bg-cokelat-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-cokelat-700 shadow-md transition">
                                <i class="fas fa-plus mr-1"></i> Tambah
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead id="thead-main" class="bg-gray-50 border-b text-gray-500"></thead>
                                <tbody id="tbody-main" class="divide-y"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- Section Catatan -->
                <section id="section-catatan" class="content-section hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800">Catatan Kecil</h2>
                        <button onclick="bukaModalCatatan()" class="bg-cokelat-900 text-white px-5 py-2 rounded-full text-sm">+ Baru</button>
                    </div>
                    <div id="catatan-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- MODAL FORM -->
    <div id="modal-form" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-700" id="form-title">Input Data</h3>
                <button onclick="tutupModal('modal-form')" class="text-gray-400 hover:text-black"><i class="fas fa-times"></i></button>
            </div>
            <form id="dynamic-form" onsubmit="simpanDataDinamis(event)" class="p-6 space-y-4">
                <div id="form-fields" class="max-h-[60vh] overflow-y-auto space-y-4 pr-2"></div>
                <button type="submit" class="w-full bg-cokelat-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-cokelat-900 transition mt-4">SIMPAN</button>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzm_-UF3QQx9AGlT1CEhFcPZMDwkw3whVMLQFr4ZOF_HUo0hWuj_9pBlr11KEOr7vXS/exec';
        const WEDDING_DATE = '2027-08-01';
        let currentSheet = '';
        let currentSection = '';

        // Tampilkan Tanggal
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function masukApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('app-wrapper').classList.remove('hidden');
            showSection('dashboard');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function showLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
        }

        function tutupModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function showSection(sectionId) {
            currentSection = sectionId;
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('header-title').innerText = sectionId.toUpperCase();

            if (sectionId === 'dashboard') {
                document.getElementById('section-dashboard').classList.remove('hidden');
                updateDashboard();
            } else if (sectionId === 'catatan') {
                document.getElementById('section-catatan').classList.remove('hidden');
                loadCatatan();
            } else {
                document.getElementById('section-tabel').classList.remove('hidden');
                setupSubMenu(sectionId);
            }
            if (window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleSidebar();
        }

        function setupSubMenu(section) {
            const container = document.getElementById('sub-menu-container');
            container.innerHTML = '';
            let menus = [];
            if (section === 'pernikahan') menus = ['Wedding_Todo', 'Wedding_Budget', 'Wedding_Vendors', 'Wedding_Guests'];
            if (section === 'keuangan') menus = ['Keuangan_Aruskas', 'Keuangan_Tagihan', 'Keuangan_Tabungan'];

            menus.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full text-xs font-bold border transition ${i===0 ? 'bg-cokelat-700 text-white' : 'bg-white text-gray-500'}`;
                btn.innerText = m.replace('_', ' ');
                btn.onclick = (e) => {
                    document.querySelectorAll('#sub-menu-container button').forEach(b => b.className = 'px-4 py-2 rounded-full text-xs font-bold border bg-white text-gray-500');
                    e.target.className = 'px-4 py-2 rounded-full text-xs font-bold border bg-cokelat-700 text-white';
                    loadData(m);
                };
                container.appendChild(btn);
            });
            loadData(menus[0]);
        }

        function loadData(sheetName) {
            currentSheet = sheetName;
            showLoader(true);
            const thead = document.getElementById('thead-main');
            const tbody = document.getElementById('tbody-main');
            thead.innerHTML = ''; tbody.innerHTML = '';

            fetch(`${GAS_URL}?action=read&sheetName=${sheetName}`)
                .then(r => r.json())
                .then(res => {
                    // Perhatikan: sekarang menggunakan res.headers dan res.data
                    if (res.status === 'success') {
                        const headers = res.headers;
                        const data = res.data;

                        // Buat Header Tabel
                        let hRow = '<tr>';
                        headers.forEach(h => { if(h !== 'ID') hRow += `<th class="p-4 font-semibold">${h}</th>` });
                        hRow += '<th class="p-4 text-center">Aksi</th></tr>';
                        thead.innerHTML = hRow;

                        // Buat Baris Data
                        if (data.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="10" class="p-10 text-center text-gray-400 italic">Belum ada data.</td></tr>';
                        } else {
                            data.forEach(item => {
                                let rRow = '<tr class="hover:bg-gray-50 transition">';
                                headers.forEach(h => { if(h !== 'ID') rRow += `<td class="p-4 text-gray-600">${item[h] || '-'}</td>` });
                                rRow += `<td class="p-4 text-center">
                                    <button onclick="hapusData('${sheetName}', '${item.ID}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                                </td></tr>`;
                                tbody.innerHTML += rRow;
                            });
                        }
                    }
                }).finally(() => showLoader(false));
        }

        
        function bukaModalForm() {
            const fields = document.getElementById('form-fields');
            fields.innerHTML = '<div class="p-4 text-center">Memuat kolom...</div>';
            document.getElementById('modal-form').classList.remove('hidden');

            fetch(`${GAS_URL}?action=read&sheetName=${currentSheet}`)
                .then(r => r.json())
                .then(res => {
                    fields.innerHTML = '';
                    res.headers.filter(h => h !== 'ID').forEach(h => {
                        fields.innerHTML += `
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">${h}</label>
                                <input type="text" name="${h}" required class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-cokelat-500 outline-none transition" placeholder="Masukkan ${h}...">
                            </div>`;
                    });
                });
        }

        function simpanDataDinamis(e) {
            e.preventDefault();
            showLoader(true);
            const formData = new FormData(e.target);
            const payload = { action: 'create', sheetName: currentSheet, data: Object.fromEntries(formData) };

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(() => {
                    tutupModal('modal-form');
                    loadData(currentSheet);
                });
        }

        function hapusData(sheet, id) {
            if (!confirm('Hapus data ini?')) return;
            showLoader(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', sheetName: sheet, id: id }) })
                .then(() => loadData(sheet));
        }

        function updateDashboard() {
            const hMin = Math.ceil((new Date(WEDDING_DATE) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('widget-h-min').innerText = hMin > 0 ? `${hMin} Hari Lagi Menuju Halal` : 'Hari Bahagia Telah Tiba!';
        }

        // Catatan Logic
        function loadCatatan() {
            showLoader(true);
            const container = document.getElementById('catatan-container');
            container.innerHTML = '';
            fetch(`${GAS_URL}?action=read&sheetName=Catatan`)
                .then(r => r.json())
                .then(res => {
                    res.data.forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 group relative">
                                <h3 class="font-bold text-gray-800 mb-2">${item.Judul}</h3>
                                <p class="text-sm text-gray-500">${item.Isi}</p>
                                <button onclick="hapusData('Catatan', '${item.ID}')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-red-300 transition hover:text-red-500">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>`;
                    });
                }).finally(() => showLoader(false));
        }
    </script>
</body>
</html>
