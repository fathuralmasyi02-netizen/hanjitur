<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANJITUR Engine v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; margin: 0; }
        .sidebar-active { background-color: #1E40AF; color: white !important; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        .app-container { height: 100vh; display: flex; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        @media (max-width: 768px) { .sidebar-hide { transform: translateX(-100%); } }
    </style>
</head>
<body class="app-container">

    <!-- Modal Input Dinamis -->
    <div id="modal-input" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-gray-800 uppercase tracking-tight">Input Data</h3>
            <div id="modal-fields" class="space-y-4">
                <!-- Content generated by JS -->
            </div>
            <div class="flex gap-3 pt-6">
                <button onclick="toggleModal()" class="flex-1 py-4 text-gray-400 font-bold hover:bg-gray-50 rounded-2xl">Batal</button>
                <button onclick="submitData()" id="btn-save" class="flex-1 py-4 bg-blue-800 text-white font-bold rounded-2xl shadow-lg">Simpan</button>
            </div>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative w-64 bg-white border-r border-gray-200 h-full z-30 transition-transform duration-300 sidebar-hide md:transform-none">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-800 rounded-lg flex items-center justify-center text-white font-bold">H</div>
                <span class="text-xl font-bold text-gray-800 tracking-tight">HANJITUR</span>
            </div>
            <nav class="flex-1 space-y-1">
                <button onclick="nav('dashboard')" id="m-dashboard" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition sidebar-active">
                    <i data-lucide="layout-dashboard" class="w-5"></i> Dashboard
                </button>
                <button onclick="nav('keuangan')" id="m-keuangan" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="wallet" class="w-5"></i> Keuangan
                </button>
                <button onclick="nav('arsip')" id="m-arsip" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="archive" class="w-5"></i> Arsip
                </button>
                <button onclick="nav('catatan')" id="m-catatan" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="sticky-note" class="w-5"></i> Catatan
                </button>
            </nav>
        </div>
    </aside>

    <div class="main-content">
        <header class="h-16 bg-white border-b border-gray-100 px-6 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="menu"></i></button>
                <h2 id="title-text" class="font-bold text-gray-700 text-xs uppercase tracking-widest">Dashboard</h2>
            </div>
            <button onclick="loadData()" id="refresh-btn" class="p-2 hover:bg-blue-50 rounded-xl transition text-blue-800">
                <i data-lucide="refresh-cw" class="w-5"></i>
            </button>
        </header>

        <div id="content" class="scroll-area p-4 md:p-8"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxSvzHjoMcCD4yfIK_EHUZh7dWAMPQMsgE_5u2iV9jBS_-NpuVultcQcYDNbKrf8wla/exec";
        
        let rawData = { keuangan: [], budget: [] }; 
        let currentPage = 'dashboard';
        let activeGrup = null;

        const CATEGORIES = {
            Masuk: ["Gaji", "Freelance", "Lainnya"],
            Keluar: ["Pangan", "Sodaqoh", "Listrik", "Internet", "Transportasi", "Air", "Pendidikan", "Kesehatan", "Lainnya"]
        };

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-hide');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function nav(page) {
            currentPage = page;
            if (window.innerWidth < 768) toggleSidebar();
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('sidebar-active'));
            document.getElementById('m-' + page)?.classList.add('sidebar-active');
            document.getElementById('title-text').innerText = page;
            render();
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn?.classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                rawData = await res.json();
                render();
            } catch (e) {
                console.error(e);
            } finally {
                btn?.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        function render() {
            const area = document.getElementById('content');
            const db = rawData.keuangan || [];

            if (currentPage === 'dashboard') {
                const totalMasuk = db.filter(d => d.Tipe === 'Masuk').reduce((a,c) => a + Number(c.Nominal || 0), 0);
                const totalKeluar = db.filter(d => d.Tipe === 'Keluar').reduce((a,c) => a + Number(c.Nominal || 0), 0);
                const saldo = totalMasuk - totalKeluar;

                area.innerHTML = `
                    <div class="bg-blue-800 p-8 md:p-12 rounded-[40px] text-white shadow-2xl mb-8">
                        <p class="text-[10px] opacity-60 uppercase font-bold mb-2 tracking-widest">Saldo Saat Ini</p>
                        <h2 class="text-3xl md:text-5xl font-bold italic">Rp ${saldo.toLocaleString('id-ID')}</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-3xl border border-gray-100">
                            <p class="text-[10px] text-green-500 font-bold uppercase mb-1">Total Masuk</p>
                            <p class="font-bold text-gray-800">Rp ${totalMasuk.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-gray-100">
                            <p class="text-[10px] text-red-500 font-bold uppercase mb-1">Total Keluar</p>
                            <p class="font-bold text-gray-800">Rp ${totalKeluar.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                `;
            } else if (currentPage === 'keuangan') {
                renderFinanceOverview(area);
            } else {
                area.innerHTML = `<div class="p-20 text-center text-gray-300 italic">Modul ${currentPage} dalam pengembangan.</div>`;
            }
            lucide.createIcons();
        }

        function renderFinanceOverview(area) {
            const db = rawData.keuangan || [];
            
            // Perhitungan Arus Kas & Budget
            const bulanIni = new Date().getMonth();
            const budgetBulanIni = 5000000; // Contoh statis, bisa diambil dari sheet budget nanti
            const pengeluaranBulanIni = db.filter(d => d.Tipe === 'Keluar' && new Date(d.Tanggal).getMonth() === bulanIni).reduce((a,c) => a + Number(c.Nominal), 0);
            
            // Perhitungan Tabungan
            const tabunganMap = {};
            db.filter(d => d.Grup === 'Tabungan').forEach(d => {
                tabunganMap[d.Kategori] = (tabunganMap[d.Kategori] || 0) + Number(d.Nominal);
            });
            const totalTabungan = Object.values(tabunganMap).reduce((a,b) => a+b, 0);

            area.innerHTML = `
                <!-- Arus Kas & Budget Section -->
                <div onclick="renderDetail('Arus Kas')" class="bg-white p-6 rounded-[32px] card-shadow mb-4 cursor-pointer border-2 border-transparent hover:border-blue-600">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-bold text-gray-800">ARUS KAS</h3>
                        <span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-bold uppercase">Budgeting</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs">
                            <span class="text-gray-400">Sisa Anggaran:</span>
                            <span class="font-bold text-blue-800">Rp ${(budgetBulanIni - pengeluaranBulanIni).toLocaleString()}</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-blue-600 h-full" style="width: ${(pengeluaranBulanIni/budgetBulanIni)*100}%"></div>
                        </div>
                    </div>
                </div>

                <!-- Tagihan Section -->
                <div onclick="renderDetail('Tagihan')" class="bg-white p-6 rounded-[32px] card-shadow mb-4 cursor-pointer border-2 border-transparent hover:border-orange-600">
                    <h3 class="font-bold text-gray-800 mb-4">TAGIHAN AKTIF</h3>
                    <div class="space-y-3">
                        ${db.filter(d => d.Grup === 'Tagihan' && d.Status !== 'Lunas').slice(0,2).map(t => `
                            <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                                <div>
                                    <p class="font-bold text-gray-700">${t.Keterangan}</p>
                                    <p class="text-[10px] text-red-400">Tempo: ${t.Kategori}</p>
                                </div>
                                <p class="font-bold">Rp ${Number(t.Nominal).toLocaleString()}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Tabungan Section -->
                <div onclick="renderDetail('Tabungan')" class="bg-white p-6 rounded-[32px] card-shadow cursor-pointer border-2 border-transparent hover:border-green-600">
                    <h3 class="font-bold text-gray-800 mb-2">TABUNGAN</h3>
                    <p class="text-2xl font-bold text-green-600 mb-4">Rp ${totalTabungan.toLocaleString()}</p>
                    <div class="grid grid-cols-2 gap-2">
                        ${Object.entries(tabunganMap).map(([cat, val]) => `
                            <div class="bg-green-50 p-3 rounded-2xl">
                                <p class="text-[9px] text-green-600 font-bold uppercase">${cat}</p>
                                <p class="text-xs font-bold text-gray-700">Rp ${val.toLocaleString()}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderDetail(grup) {
            const area = document.getElementById('content');
            const items = (rawData.keuangan || []).filter(d => d.Grup === grup);
            activeGrup = grup;

            area.innerHTML = `
                <button onclick="nav('keuangan')" class="text-[10px] font-bold text-gray-400 mb-6 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="arrow-left" class="w-3"></i> Kembali</button>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">${grup}</h2>
                    <button onclick="toggleModal('${grup}')" class="bg-blue-800 text-white px-5 py-2.5 rounded-2xl font-bold text-xs shadow-lg">+ Tambah</button>
                </div>
                
                ${grup === 'Tagihan' ? `
                    <div class="flex gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
                        ${['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'].map((m, i) => `
                            <button class="px-4 py-2 rounded-xl text-xs font-bold ${new Date().getMonth() === i ? 'bg-blue-800 text-white' : 'bg-white text-gray-400'} border border-gray-100">${m}</button>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="space-y-3">
                    ${items.reverse().map(item => `
                        <div class="bg-white p-5 rounded-[28px] card-shadow border border-gray-50">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-[10px] font-bold text-blue-500 uppercase mb-1">${item.Kategori}</p>
                                    <p class="font-bold text-gray-800">${item.Keterangan}</p>
                                    <p class="text-[10px] text-gray-400 mt-1">${new Date(item.Tanggal).toLocaleDateString('id-ID')}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold ${item.Tipe === 'Masuk' ? 'text-green-600' : 'text-gray-800'}">
                                        ${item.Tipe === 'Masuk' ? '+' : '-'} Rp ${Number(item.Nominal).toLocaleString()}
                                    </p>
                                    ${item.Grup === 'Tagihan' ? `
                                        <span class="text-[9px] px-2 py-1 rounded-full font-bold ${item.Status === 'Lunas' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                            ${item.Status || 'Belum Lunas'}
                                        </span>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function toggleModal(grup = null) {
            const modal = document.getElementById('modal-input');
            const fields = document.getElementById('modal-fields');
            if (grup) {
                activeGrup = grup;
                updateModalFields(grup);
            }
            modal.classList.toggle('hidden');
        }

        function updateModalFields(grup) {
            const fields = document.getElementById('modal-fields');
            let html = `
                <input type="text" id="in-keterangan" placeholder="Keterangan / Nama Item" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:ring-2 ring-blue-100">
                <input type="number" id="in-nominal" placeholder="Nominal (Rp)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none focus:ring-2 ring-blue-100">
            `;

            if (grup === 'Arus Kas') {
                html += `
                    <select id="in-tipe" onchange="updateCategoryDropdown(this.value)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                        <option value="Keluar">Uang Keluar (-)</option>
                        <option value="Masuk">Uang Masuk (+)</option>
                    </select>
                    <div id="cat-wrapper">
                        <select id="in-kategori" onchange="checkLainnya(this.value)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                            ${CATEGORIES.Keluar.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                    </div>
                    <input type="text" id="in-kategori-custom" placeholder="Sebutkan Kategori Lainnya..." class="w-full p-4 bg-yellow-50 rounded-2xl border border-yellow-100 outline-none hidden">
                `;
            } else if (grup === 'Tagihan') {
                html += `
                    <input type="text" id="in-kategori" placeholder="Tanggal Jatuh Tempo (Contoh: 25 Jan)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                    <select id="in-tipe" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                        <option value="Keluar">Tagihan Keluar</option>
                    </select>
                    <select id="in-status" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none text-red-500 font-bold">
                        <option value="Belum Lunas">BELUM LUNAS</option>
                        <option value="Lunas">LUNAS</option>
                    </select>
                `;
            } else if (grup === 'Tabungan') {
                html += `
                    <select id="in-kategori" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                        <option value="Bank BCA">Bank BCA</option>
                        <option value="E-Wallet">E-Wallet (Dana/Ovo)</option>
                        <option value="Investasi">Investasi (Emas/Reksadana)</option>
                        <option value="Tunai">Simpanan Tunai</option>
                    </select>
                    <input type="hidden" id="in-tipe" value="Masuk">
                `;
            }

            fields.innerHTML = html;
        }

        function updateCategoryDropdown(tipe) {
            const wrapper = document.getElementById('cat-wrapper');
            const cats = CATEGORIES[tipe];
            wrapper.innerHTML = `
                <select id="in-kategori" onchange="checkLainnya(this.value)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                    ${cats.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
            `;
        }

        function checkLainnya(val) {
            const custom = document.getElementById('in-kategori-custom');
            if(val === 'Lainnya') custom.classList.remove('hidden');
            else custom.classList.add('hidden');
        }

        async function submitData() {
            const btn = document.getElementById('btn-save');
            const catVal = document.getElementById('in-kategori').value;
            const customCat = document.getElementById('in-kategori-custom')?.value;

            const payload = {
                grup: activeGrup,
                keterangan: document.getElementById('in-keterangan').value,
                nominal: document.getElementById('in-nominal').value,
                kategori: (catVal === 'Lainnya' && customCat) ? customCat : catVal,
                tipe: document.getElementById('in-tipe')?.value || 'Keluar',
                status: document.getElementById('in-status')?.value || 'Selesai'
            };

            if(!payload.keterangan || !payload.nominal) return alert("Mohon lengkapi data!");
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                toggleModal();
                setTimeout(loadData, 1000);
            } catch (e) {
                alert("Koneksi bermasalah!");
            } finally {
                btn.innerText = "Simpan";
                btn.disabled = false;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
