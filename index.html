<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HANJITUR | Private App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4B3832', 'secondary': '#854442', 'accent': '#BE9B7B', 'base': '#FFF4E6'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFF4E6; }
        .welcome-screen {
            background: linear-gradient(rgba(75, 56, 50, 0.7), rgba(75, 56, 50, 0.7)), 
                        url('https://lh3.googleusercontent.com/d/1Xwzd9S_wuNBv40AFeSORQsdd6JfZAwHp');
            background-size: cover; background-position: center;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="overflow-hidden">

    <!-- LOADING SPINNER -->
    <div id="loader" class="fixed inset-0 z-[200] bg-base flex items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-primary"></div>
    </div>

    <!-- WELCOME SCREEN -->
    <div id="welcome" class="fixed inset-0 z-[100] welcome-screen flex flex-col items-center justify-center text-white text-center p-6">
        <h1 class="text-5xl font-bold mb-2 italic tracking-tighter">Hanjitur</h1>
        <p class="text-lg opacity-90 mb-8 font-light">Satu Ruang Untuk Berdua</p>
        <button onclick="startApp()" class="px-8 py-3 bg-white text-primary font-bold rounded-full shadow-xl hover:scale-105 transition-transform">
            Masuk Sekarang
        </button>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hidden h-screen flex overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-primary text-base transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-8 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold italic">HANJITUR</h2>
                    <p class="text-[10px] opacity-50 tracking-[0.3em] uppercase">Private Space</p>
                </div>
                <!-- CLOSE BUTTON FOR SIDEBAR -->
                <button onclick="toggleSidebar()" class="md:hidden p-1 text-base/50 hover:text-white">
                    <i data-lucide="x-circle"></i>
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto hide-scrollbar">
                <button onclick="nav('Dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Dashboard">
                    <i data-lucide="layout-grid" class="w-5"></i> Dashboard
                </button>
                <button onclick="nav('Pernikahan')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Pernikahan">
                    <i data-lucide="heart" class="w-5"></i> Pernikahan
                </button>
                <button onclick="nav('Keuangan')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Keuangan">
                    <i data-lucide="wallet" class="w-5"></i> Keuangan
                </button>
                <button onclick="nav('Logistik')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Logistik">
                    <i data-lucide="package" class="w-5"></i> Logistik
                </button>
                <button onclick="nav('Maintenance')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Maintenance">
                    <i data-lucide="wrench" class="w-5"></i> Maintenance
                </button>
                <button onclick="nav('Catatan')" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/10" id="btn-Catatan">
                    <i data-lucide="sticky-note" class="w-5"></i> Catatan
                </button>
            </nav>
        </aside>

        <!-- CONTENT AREA -->
        <main class="flex-1 flex flex-col min-w-0 relative">
            <header class="h-16 flex items-center justify-between px-6 bg-white/50 border-b border-primary/5 backdrop-blur-md">
                <button onclick="toggleSidebar()" class="p-2 text-primary"><i data-lucide="menu"></i></button>
                <h2 id="page-title" class="font-bold text-primary uppercase tracking-widest text-sm">Dashboard</h2>
                <button onclick="refreshData()" class="p-2 text-primary" id="refresh-icon"><i data-lucide="refresh-cw" class="w-5"></i></button>
            </header>

            <div id="content" class="flex-1 overflow-y-auto p-4 md:p-8 hide-scrollbar"></div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[32px] p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal-title" class="text-xl font-bold text-primary mb-6">Tambah Data</h3>
            <div id="modal-body" class="space-y-4"></div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 text-gray-400 font-bold">Batal</button>
                <button id="btn-save" onclick="saveData()" class="flex-1 py-3 bg-primary text-white font-bold rounded-2xl shadow-lg">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxFQ1BJFuI3NM4eULiBlS1kfXK--55HudMtzHkmhCZ-Zp55nVFbt-DP5gTi-EhXzGKt/exec";
        
        let allData = {};
        let activeMenu = 'Dashboard';
        let activeSub = '';

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function startApp() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            refreshData();
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                allData = await res.json();
                render();
            } catch (e) { alert("Koneksi gagal!"); }
            icon.classList.remove('animate-spin');
            lucide.createIcons();
        }

        function nav(menu, sub = '') {
            activeMenu = menu; activeSub = sub;
            document.getElementById('page-title').innerText = sub || menu;
            // Tutup sidebar jika di mobile
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
            render();
        }

        function render() {
            const c = document.getElementById('content');
            c.innerHTML = '';
            if (activeMenu === 'Dashboard') renderDashboard(c);
            else if (activeMenu === 'Keuangan') renderKeuangan(c);
            else if (activeMenu === 'Catatan') renderCatatan(c);
            else if (activeMenu === 'Pernikahan' && !activeSub) renderSubMenu(c, ['Daftar Tugas', 'Anggaran', 'Vendor', 'Tamu']);
            else renderTable(c);
            lucide.createIcons();
        }

        function renderDashboard(c) {
            const s = allData.stats || {wedding_days:0, wedding_progress:0, today: ''};
            c.innerHTML = `
                <div class="mb-8">
                    <p class="text-primary/60 font-bold uppercase text-[10px] tracking-widest">${s.today}</p>
                    <h1 class="text-3xl font-bold text-primary italic">Halo, Hanji & Pasangan!</h1>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-primary p-8 rounded-[40px] text-white shadow-xl">
                        <p class="text-xs opacity-60 uppercase mb-1">Wedding Countdown</p>
                        <h2 class="text-5xl font-bold">${s.wedding_days} <span class="text-lg font-light">Hari lagi</span></h2>
                    </div>
                    <div class="bg-accent p-8 rounded-[40px] text-primary shadow-lg">
                        <p class="text-xs opacity-60 uppercase mb-1">Progress Persiapan</p>
                        <h2 class="text-5xl font-bold">${s.wedding_progress}%</h2>
                    </div>
                </div>
            `;
        }

        function renderSubMenu(c, subs) {
            c.innerHTML = `<div class="grid grid-cols-2 gap-4">
                ${subs.map(s => `<button onclick="nav('${activeMenu}', '${s}')" class="bg-white p-8 rounded-[32px] shadow-sm border border-primary/5 font-bold text-primary hover:bg-primary hover:text-white transition-all">${s}</button>`).join('')}
            </div>`;
        }

        function renderKeuangan(c) {
            const data = allData['keuangan'] || [];
            const masuk = data.filter(k => k.Tipe === 'Masuk').reduce((a, b) => a + Number(b.Nominal), 0);
            const keluar = data.filter(k => k.Tipe === 'Keluar').reduce((a, b) => a + Number(b.Nominal), 0);
            const saldo = masuk - keluar;

            if(!activeSub) {
                c.innerHTML = `
                    <div class="bg-white p-8 rounded-[40px] shadow-sm mb-6 border border-primary/5">
                        <p class="text-[10px] uppercase font-bold text-primary/40 mb-2">Total Saldo Gabungan</p>
                        <h2 class="text-4xl font-bold text-primary italic">Rp ${saldo.toLocaleString('id-ID')}</h2>
                    </div>`;
                renderSubMenu(c, ['Arus Kas', 'Tagihan', 'Budget', 'Tabungan']);
            } else { renderTable(c); }
        }

        function renderTable(c) {
            let sn = getSheetName();
            let data = allData[sn] || [];
            
            // Filter Data Keuangan berdasarkan Grup jika sedang di menu Keuangan
            if (activeMenu === 'Keuangan' && activeSub !== '') {
                data = data.filter(item => item.Grup === activeSub);
            }

            c.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="nav('${activeMenu}')" class="text-primary font-bold text-xs flex items-center gap-1"><i data-lucide="arrow-left" class="w-4"></i> Kembali</button>
                    <button onclick="openModal('${sn}')" class="bg-primary text-white px-6 py-2 rounded-xl text-xs font-bold">+ Tambah</button>
                </div>
                <div class="bg-white rounded-[32px] overflow-x-auto shadow-sm border border-primary/5">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-primary/5 text-[10px] uppercase text-primary tracking-widest">
                            <tr>${Object.keys(data[0] || {Data:'Kosong'}).map(h => `<th class="p-4">${h}</th>`).join('')}</tr>
                        </thead>
                        <tbody class="divide-y divide-primary/5">
                            ${data.length > 0 ? data.map(row => `<tr>${Object.values(row).map(v => `<td class="p-4">${v}</td>`).join('')}</tr>`).join('') : '<tr><td class="p-8 text-center opacity-30" colspan="10">Belum ada data</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function getSheetName() {
            if (activeMenu === 'Keuangan') return 'keuangan';
            if (activeSub === 'Daftar Tugas') return 'wedding_todo';
            if (activeSub === 'Anggaran') return 'wedding_budget';
            if (activeSub === 'Vendor') return 'wedding_vendors';
            if (activeSub === 'Tamu') return 'wedding_guests';
            return activeMenu;
        }

        function renderCatatan(c) {
            const notes = allData['Catatan'] || [];
            c.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-primary italic uppercase">Catatan Kami</h2>
                    <button onclick="openModal('Catatan')" class="bg-primary text-white px-6 py-2 rounded-xl text-xs font-bold">+ Baru</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${notes.map(n => `<div class="bg-white p-6 rounded-[32px] shadow-sm"><h3 class="font-bold mb-2">${n.Judul}</h3><p class="text-sm opacity-70">${n.Isi}</p></div>`).join('')}
                </div>
            `;
        }

        function openModal(sheet) {
            const m = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            m.dataset.sheet = sheet;
            
            // Definisi Field Input per Sheet/Menu agar lebih presisi
            let configFields = {
                'keuangan': ['Tanggal', 'Keterangan', 'Nominal', 'Tipe', 'Grup'],
                'wedding_todo': ['Tugas', 'Deadline', 'Status', 'PJ'],
                'wedding_budget': ['Item', 'Budget', 'Aktual', 'Status'],
                'Catatan': ['Tanggal', 'Judul', 'Isi'],
                'Logistik': ['Nama Barang', 'Jumlah', 'Status', 'Lokasi'],
                'Maintenance': ['Kegiatan', 'Jadwal', 'Biaya', 'Status']
            };

            let fields = configFields[sheet] || (allData[sheet] && allData[sheet].length > 0 ? Object.keys(allData[sheet][0]) : ['Keterangan', 'Nominal']);
            
            body.innerHTML = fields.map(f => {
                let inputType = "text";
                if(f.toLowerCase().includes('tanggal') || f.toLowerCase().includes('deadline')) inputType = "date";
                if(f.toLowerCase().includes('nominal') || f.toLowerCase().includes('biaya') || f.toLowerCase().includes('budget')) inputType = "number";
                
                // Prefill untuk Keuangan sesuai Sub-Menu
                let value = "";
                if(sheet === 'keuangan' && f === 'Grup') value = activeSub;
                if(sheet === 'keuangan' && f === 'Tanggal') value = new Date().toISOString().split('T')[0];

                // Jika Field adalah 'Tipe' (Keuangan) atau 'Status', berikan hint/pilihan sederhana via list datalist
                return `<div>
                    <label class="text-[10px] font-bold uppercase ml-2 text-primary/50">${f}</label>
                    <input id="inp-${f}" type="${inputType}" value="${value}" class="w-full p-4 bg-base rounded-2xl outline-none focus:ring-2 ring-primary/20" placeholder="Masukkan ${f}...">
                </div>`;
            }).join('');

            m.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveData() {
            const btn = document.getElementById('btn-save');
            const sheet = document.getElementById('modal').dataset.sheet;
            let data = {};
            document.querySelectorAll('#modal-body input').forEach(i => data[i.id.replace('inp-', '')] = i.value);
            
            btn.innerText = "Menyimpan..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({sheet, data}) });
                closeModal();
                setTimeout(refreshData, 1500);
            } catch (e) { alert("Gagal simpan!"); }
            btn.innerText = "Simpan"; btn.disabled = false;
        }

    </script>
</body>
</html>
