<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANJITUR - Sistem Rumah Tangga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        .active-menu { background-color: #1E40AF; color: white !important; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        @media (max-width: 768px) {
            .sidebar-hide { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Overlay Mobile -->
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed md:relative w-64 bg-white border-r border-gray-200 h-full z-30 sidebar-transition sidebar-hide md:transform-none">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-blue-800 rounded-lg flex items-center justify-center text-white font-bold">H</div>
                <span class="text-xl font-bold text-gray-800">HANJITUR</span>
            </div>

            <nav class="flex-1 space-y-1">
                <button onclick="changePage('dashboard')" id="m-dashboard" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="layout-dashboard" class="w-5"></i> Dashboard
                </button>
                <button onclick="changePage('keuangan')" id="m-keuangan" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="wallet" class="w-5"></i> Keuangan
                </button>
                <button onclick="changePage('logistik')" id="m-logistik" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="shopping-basket" class="w-5"></i> Logistik
                </button>
                <button onclick="changePage('maintenance')" id="m-maintenance" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="wrench" class="w-5"></i> Maintenance
                </button>
                <button onclick="changePage('arsip')" id="m-arsip" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="archive" class="w-5"></i> Arsip
                </button>
                <button onclick="changePage('catatan')" id="m-catatan" class="menu-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-100 transition">
                    <i data-lucide="sticky-note" class="w-5"></i> Catatan
                </button>
            </nav>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-100 px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg">
                    <i data-lucide="menu"></i>
                </button>
                <h2 id="title-text" class="font-bold text-gray-700">Dashboard</h2>
            </div>
            <button onclick="loadData()" class="p-2 hover:bg-blue-50 rounded-full transition text-blue-800" id="refresh-btn">
                <i data-lucide="refresh-cw" class="w-5"></i>
            </button>
        </header>

        <!-- Content Area -->
        <div id="content" class="p-6 overflow-y-auto flex-1">
            <div class="flex items-center justify-center h-full text-gray-400">Memuat data dari Spreadsheet...</div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdTIZMWjRxdPlTbPtt7DmGyPSFO3VFVbK7wQBRRdxSDVu8If7JpUwTGMi0dgAtYXTf/exec";
        let rawData = null;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-hide');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                rawData = await res.json();
                changePage('dashboard');
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg">Gagal terhubung ke API. Pastikan Deployment Apps Script sudah benar.</div>`;
            } finally {
                btn.classList.remove('animate-spin');
            }
        }

        function changePage(page) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active-menu'));
            document.getElementById('m-' + page).classList.add('active-menu');
            document.getElementById('title-text').innerText = page.charAt(0).toUpperCase() + page.slice(1);
            if(window.innerWidth < 768) toggleSidebar();
            
            const area = document.getElementById('content');
            if (page === 'dashboard') renderDashboard(area);
            else if (page === 'keuangan') renderKeuangan(area);
            else area.innerHTML = `<div class="text-center p-20 text-gray-400">Menu ${page} sedang dikembangkan.</div>`;
        }

        function renderDashboard(area) {
            const keuangan = rawData.keuangan || [];
            let saldo = 0;
            keuangan.forEach(t => {
                if(t.Tipe === 'Masuk') saldo += t.Nominal; else saldo -= t.Nominal;
            });

            area.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-blue-800 p-6 rounded-2xl text-white card-shadow">
                        <p class="text-xs opacity-70 mb-1">Total Saldo Tersedia</p>
                        <h3 class="text-2xl font-bold">Rp ${saldo.toLocaleString('id-ID')}</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                        <p class="text-xs text-gray-400 mb-1">Tagihan Bulan Ini</p>
                        <h3 class="text-xl font-bold text-gray-800">Cek Tab Tagihan</h3>
                    </div>
                </div>
            `;
        }

        function renderKeuangan(area) {
            const data = rawData.keuangan || [];
            let html = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-gray-700">Ringkasan Arus Kas</h3>
                        <button class="bg-blue-800 text-white px-4 py-2 rounded-xl text-sm font-semibold">+ Tambah Transaksi</button>
                    </div>
                    <div class="bg-white rounded-2xl card-shadow overflow-hidden border border-gray-100">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                    <th class="p-4">Tanggal</th>
                                    <th class="p-4">Keterangan</th>
                                    <th class="p-4 text-right">Nominal</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${data.map(row => `
                                    <tr class="hover:bg-gray-50 transition">
                                        <td class="p-4 text-xs text-gray-400">${new Date(row.Tanggal).toLocaleDateString('id-ID')}</td>
                                        <td class="p-4">
                                            <p class="font-bold text-sm text-gray-700">${row.Keterangan}</p>
                                            <p class="text-[10px] text-gray-400 uppercase">${row.Kategori}</p>
                                        </td>
                                        <td class="p-4 text-right font-bold ${row.Tipe === 'Masuk' ? 'text-green-600' : 'text-red-600'}">
                                            ${row.Tipe === 'Masuk' ? '+' : '-'} ${row.Nominal.toLocaleString('id-ID')}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            area.innerHTML = html;
        }

        window.onload = () => {
            lucide.createIcons();
            loadData();
        };
    </script>
</body>
</html>
