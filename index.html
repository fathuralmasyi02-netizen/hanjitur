<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANJITUR - Home System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .sidebar-active { background-color: #F3EFE0; color: #8B5E3C; border-right: 4px solid #1E40AF; }
        .card-elegant { background: white; border-radius: 16px; border: 1px solid #E5E7EB; transition: all 0.3s; }
        .card-elegant:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-blue-800 rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="home" class="w-6"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">HANJITUR</h1>
            </div>
            
            <nav class="space-y-2" id="main-nav">
                <button onclick="switchPage('dashboard')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition sidebar-active" id="btn-dashboard">
                    <i data-lucide="layout-dashboard" class="w-5"></i> <span>Dashboard</span>
                </button>
                <button onclick="switchPage('keuangan')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition" id="btn-keuangan">
                    <i data-lucide="wallet" class="w-5"></i> <span>Keuangan</span>
                </button>
                <button onclick="switchPage('logistik')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition" id="btn-logistik">
                    <i data-lucide="package" class="w-5"></i> <span>Logistik</span>
                </button>
                <button onclick="switchPage('maintenance')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition" id="btn-maintenance">
                    <i data-lucide="settings" class="w-5"></i> <span>Maintenance</span>
                </button>
                <button onclick="switchPage('arsip')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition" id="btn-arsip">
                    <i data-lucide="shield-check" class="w-5"></i> <span>Arsip</span>
                </button>
                <button onclick="switchPage('catatan')" class="w-full flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-gray-50 transition" id="btn-catatan">
                    <i data-lucide="file-text" class="w-5"></i> <span>Catatan</span>
                </button>
            </nav>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Top Bar -->
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-8">
            <h2 id="page-title" class="text-xl font-semibold text-gray-800">Dashboard</h2>
            <div class="flex items-center gap-4 text-sm font-medium text-gray-600">
                <span id="current-date"></span>
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-800">H</div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <section class="p-8 overflow-y-auto flex-1">
            <div id="content-area">
                <!-- Dashboard Default View -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="card-elegant p-6 bg-blue-800 text-white border-none">
                        <p class="opacity-80 text-sm mb-1">Sisa Saldo Bulanan</p>
                        <h3 class="text-3xl font-bold">Rp 12.450.000</h3>
                        <div class="mt-4 pt-4 border-t border-white/10 flex justify-between text-xs">
                            <span>Pengeluaran Hari Ini</span>
                            <span>Rp 150.000</span>
                        </div>
                    </div>
                    <div class="card-elegant p-6 border-l-4 border-l-amber-500">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-gray-400 text-sm mb-1">Tagihan Terdekat</p>
                                <h3 class="text-xl font-bold text-gray-800">Internet & TV</h3>
                            </div>
                            <span class="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-bold rounded">3 HARI LAGI</span>
                        </div>
                        <p class="mt-2 text-sm text-gray-500 font-semibold">Rp 455.000</p>
                    </div>
                    <div class="card-elegant p-6">
                        <p class="text-gray-400 text-sm mb-1">Daftar Belanja</p>
                        <h3 class="text-xl font-bold text-gray-800">8 Item Menunggu</h3>
                        <button class="mt-3 text-blue-700 text-xs font-bold hover:underline">Lihat Semua →</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function switchPage(page) {
            // Update Title & UI
            const title = page.charAt(0).toUpperCase() + page.slice(1);
            document.getElementById('page-title').innerText = title;
            
            // Update Active Menu
            document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('sidebar-active'));
            document.getElementById('btn-' + page).classList.add('sidebar-active');

            // Contoh logic sederhana ganti konten
            const area = document.getElementById('content-area');
            if(page !== 'dashboard') {
                area.innerHTML = `<div class="card-elegant p-10 text-center text-gray-400 border-dashed border-2">
                    Halaman <b>${title}</b> sedang dalam sinkronisasi data dari Spreadsheet...
                </div>`;
            } else {
                location.reload(); // Balik ke default dashboard
            }
        }
    </script>
</body>
</html>
