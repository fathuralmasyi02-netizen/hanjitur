<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANJITUR - Finance Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF0; }
        .sidebar-active { background-color: #1E40AF; color: white !important; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        
        /* Fix Scroll di HP */
        .main-container { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }

        @media (max-width: 768px) { 
            .sidebar-hide { transform: translateX(-100%); } 
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Modal Input Dinamis -->
    <div id="modal-input" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-gray-800 uppercase tracking-tight">Catat Data</h3>
            <div id="modal-fields" class="space-y-4"></div>
            <div class="flex gap-3 pt-6">
                <button onclick="toggleModal()" class="flex-1 py-4 text-gray-400 font-bold hover:bg-gray-50 rounded-2xl transition">Batal</button>
                <button onclick="submitData()" id="btn-save" class="flex-1 py-4 bg-blue-800 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Overlay untuk Sidebar Mobile -->
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:relative w-64 bg-white border-r border-gray-200 h-full z-30 transition-transform duration-300 sidebar-hide md:transform-none">
        <div class="p-6 h-full flex flex-col">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="w-8 h-8 bg-blue-800 rounded-lg flex items-center justify-center text-white font-bold">H</div>
                <span class="text-xl font-bold text-gray-800 tracking-tight">HANJITUR</span>
            </div>
            <nav class="flex-1 space-y-1">
                <button onclick="navAction('dashboard')" id="m-dashboard" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition sidebar-active">
                    <i data-lucide="layout-dashboard" class="w-5"></i> Dashboard
                </button>
                <button onclick="navAction('keuangan')" id="m-keuangan" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="wallet" class="w-5"></i> Keuangan
                </button>
                <button onclick="navAction('logistik')" id="m-logistik" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="shopping-basket" class="w-5"></i> Logistik
                </button>
                <button onclick="navAction('maintenance')" id="m-maintenance" class="menu-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-500 hover:bg-gray-50 transition">
                    <i data-lucide="wrench" class="w-5"></i> Maintenance
                </button>
            </nav>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-container flex-1">
        <header class="h-16 bg-white border-b border-gray-100 px-6 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="menu"></i></button>
                <h2 id="title-text" class="font-bold text-gray-700 text-xs uppercase tracking-widest">Dashboard</h2>
            </div>
            <button onclick="loadData()" id="refresh-btn" class="p-2 hover:bg-blue-50 rounded-xl transition text-blue-800">
                <i data-lucide="refresh-cw" class="w-5"></i>
            </button>
        </header>

        <div id="content" class="scroll-area p-4 md:p-8">
            <div class="flex flex-col items-center justify-center h-64 text-gray-400">
                <div class="animate-spin mb-4"><i data-lucide="refresh-cw"></i></div>
                <p>Sinkronisasi data...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby6o_DWVJyPmJuteKNRnqjjDOz04U5YhBRbWvVYRwZT_tJW4UPaDj7fRJzuRDeCFTn5/exec";
        
        let rawData = { keuangan: [], budget: [] };
        let activeGrup = null;
        let currentPage = 'dashboard';

        // Fungsi gabungan untuk navigasi & tutup sidebar di HP
        function navAction(page) {
            if (window.innerWidth < 768) toggleSidebar();
            
            if (page === 'keuangan') {
                openFinanceOverview();
            } else {
                changePage(page);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-hide');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn?.classList.add('animate-spin');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                rawData = data;
                renderCurrentPage();
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="text-center p-10">Koneksi terputus. Silakan refresh.</div>`;
            } finally {
                btn?.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        function toggleModal(grup = null) {
            const modal = document.getElementById('modal-input');
            const fields = document.getElementById('modal-fields');
            const title = document.getElementById('modal-title');
            
            if (grup) {
                activeGrup = grup;
                title.innerText = `Input ${grup}`;
                let html = `
                    <input type="text" id="in-keterangan" placeholder="Keterangan" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                    <input type="number" id="in-nominal" placeholder="Nominal" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                    <input type="text" id="in-kategori" placeholder="Kategori" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                `;
                
                if (grup === 'Arus Kas') {
                    html += `<select id="in-tipe" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                                <option value="Masuk">Uang Masuk (+)</option>
                                <option value="Keluar">Uang Keluar (-)</option>
                             </select>`;
                } else if (grup === 'Tagihan') {
                    html += `<select id="in-status" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 outline-none">
                                <option value="Belum">Belum Lunas</option>
                                <option value="Lunas">Lunas</option>
                             </select>`;
                }
                fields.innerHTML = html;
            }
            modal.classList.toggle('hidden');
        }

        async function submitData() {
            const btnSave = document.getElementById('btn-save');
            const data = {
                grup: activeGrup,
                keterangan: document.getElementById('in-keterangan').value,
                nominal: document.getElementById('in-nominal').value,
                kategori: document.getElementById('in-kategori').value,
                tipe: document.getElementById('in-tipe')?.value || (activeGrup === 'Arus Kas' ? 'Masuk' : 'Keluar'),
                status: document.getElementById('in-status')?.value || 'Lunas'
            };

            if(!data.keterangan || !data.nominal) return alert("Isi data.");
            btnSave.innerText = "Saving...";
            btnSave.disabled = true;

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                toggleModal();
                setTimeout(loadData, 1500);
            } catch (e) { 
                toggleModal();
                loadData(); 
            } finally { 
                btnSave.innerText = "Simpan"; 
                btnSave.disabled = false; 
            }
        }

        function changePage(page) {
            currentPage = page;
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('sidebar-active'));
            document.getElementById('m-' + page)?.classList.add('sidebar-active');
            document.getElementById('title-text').innerText = page;
            renderCurrentPage();
        }

        function openFinanceOverview() {
            currentPage = 'keuangan_home';
            changePage('keuangan');
        }

        function renderCurrentPage() {
            const area = document.getElementById('content');
            if (currentPage === 'dashboard') renderDashboard(area);
            else if (currentPage === 'keuangan_home') renderFinanceOverview(area);
            else area.innerHTML = `<div class="text-center p-20 text-gray-300 italic">Modul ${currentPage.toUpperCase()} sedang dikalibrasi.</div>`;
            lucide.createIcons();
        }

        function renderDashboard(area) {
            const list = rawData.keuangan || [];
            let saldo = list.reduce((a, c) => c.Tipe === 'Masuk' ? a + Number(c.Nominal) : a - Number(c.Nominal), 0);
            area.innerHTML = `
                <div class="bg-blue-800 p-8 md:p-12 rounded-[40px] text-white shadow-2xl mb-8">
                    <p class="text-[10px] opacity-60 uppercase font-bold mb-2">Net Balance</p>
                    <h2 class="text-3xl md:text-5xl font-bold italic">Rp ${saldo.toLocaleString('id-ID')}</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-[32px] border border-gray-100">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Status Logistik</p>
                        <p class="font-bold text-gray-700 text-lg">Normal</p>
                    </div>
                    <div class="bg-white p-6 rounded-[32px] border border-gray-100">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Maintenance</p>
                        <p class="font-bold text-gray-700 text-lg">0 Jadwal</p>
                    </div>
                </div>
            `;
        }

        function renderFinanceOverview(area) {
            const data = rawData.keuangan || [];
            const budget = rawData.budget || [];

            const sums = {
                cash: data.filter(d => d.Grup === 'Arus Kas').reduce((a,c)=> c.Tipe === 'Masuk' ? a + Number(c.Nominal) : a - Number(c.Nominal), 0),
                bill: data.filter(d => d.Grup === 'Tagihan' && d.Status === 'Belum').reduce((a,c)=> a + Number(c.Nominal), 0),
                save: data.filter(d => d.Grup === 'Tabungan').reduce((a,c)=> a + Number(c.Nominal), 0)
            };

            area.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div onclick="renderDetailGrup('Arus Kas')" class="bg-white p-8 rounded-[40px] card-shadow cursor-pointer border-2 border-transparent hover:border-blue-800 transition">
                        <div class="flex justify-between mb-4"><i data-lucide="activity" class="text-blue-800"></i><i data-lucide="chevron-right" class="text-gray-300"></i></div>
                        <h3 class="font-bold text-gray-800">Arus Kas</h3>
                        <div class="text-2xl font-bold text-blue-800 mt-2">Rp ${sums.cash.toLocaleString()}</div>
                    </div>
                    <div onclick="renderDetailGrup('Anggaran')" class="bg-white p-8 rounded-[40px] card-shadow cursor-pointer border-2 border-transparent hover:border-indigo-800 transition">
                        <div class="flex justify-between mb-4"><i data-lucide="pie-chart" class="text-indigo-800"></i><i data-lucide="chevron-right" class="text-gray-300"></i></div>
                        <h3 class="font-bold text-gray-800">Anggaran</h3>
                        <div class="text-sm font-bold text-indigo-800 mt-2">${budget.length} Kategori</div>
                    </div>
                    <div onclick="renderDetailGrup('Tagihan')" class="bg-white p-8 rounded-[40px] card-shadow cursor-pointer border-2 border-transparent hover:border-orange-600 transition">
                        <div class="flex justify-between mb-4"><i data-lucide="calendar-alert" class="text-orange-600"></i><i data-lucide="chevron-right" class="text-gray-300"></i></div>
                        <h3 class="font-bold text-gray-800">Tagihan</h3>
                        <div class="text-2xl font-bold text-orange-600 mt-2">Rp ${sums.bill.toLocaleString()}</div>
                    </div>
                    <div onclick="renderDetailGrup('Tabungan')" class="bg-white p-8 rounded-[40px] card-shadow cursor-pointer border-2 border-transparent hover:border-green-600 transition">
                        <div class="flex justify-between mb-4"><i data-lucide="piggy-bank" class="text-green-600"></i><i data-lucide="chevron-right" class="text-gray-300"></i></div>
                        <h3 class="font-bold text-gray-800">Tabungan</h3>
                        <div class="text-2xl font-bold text-green-600 mt-2">Rp ${sums.save.toLocaleString()}</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderDetailGrup(grup) {
            const area = document.getElementById('content');
            const items = (rawData.keuangan || []).filter(d => d.Grup === grup);
            
            let html = `
                <button onclick="openFinanceOverview()" class="text-xs font-bold text-gray-400 mb-6 flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4"></i> KEMBALI
                </button>
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">${grup}</h2>
                    <button onclick="toggleModal('${grup}')" class="bg-blue-800 text-white px-5 py-2.5 rounded-2xl font-bold flex items-center gap-2">
                        <i data-lucide="plus" class="w-4"></i> Tambah
                    </button>
                </div>
                <div class="bg-white rounded-[32px] overflow-hidden border border-gray-100 card-shadow overflow-x-auto">
                    <table class="w-full text-left">
                        <tr class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-widest"><th class="p-5">Deskripsi</th><th class="p-5 text-right">Nominal</th></tr>
                        ${items.length === 0 ? '<tr><td colspan="2" class="p-10 text-center text-gray-300 italic">Data kosong</td></tr>' : 
                          items.reverse().map(row => `
                            <tr class="border-t border-gray-50">
                                <td class="p-5">
                                    <div class="font-bold text-gray-800 text-sm">${row.Keterangan}</div>
                                    <div class="text-[10px] text-gray-400 font-bold uppercase">${row.Kategori}</div>
                                </td>
                                <td class="p-5 text-right">
                                    <div class="font-bold ${row.Tipe === 'Masuk' ? 'text-green-600' : 'text-gray-800'}">
                                        ${row.Tipe === 'Masuk' ? '+' : '-'} ${Number(row.Nominal).toLocaleString()}
                                    </div>
                                    <div class="text-[9px] font-bold text-gray-400 uppercase">${row.Status || ''}</div>
                                </td>
                            </tr>
                          `).join('')
                        }
                    </table>
                </div>`;

            area.innerHTML = html;
            area.scrollTop = 0; // Balik ke atas saat buka detail
            lucide.createIcons();
        }

        window.onload = loadData;
    </script>
</body>
</html>
