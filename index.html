<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanjitur App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        krem: '#FFFDD0',
                        cokelat: { 500: '#795548', 700: '#5D4037', 900: '#3E2723' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .bg-welcome {
            background-image: url('https://drive.google.com/uc?export=view&id=1Xwzd9S_wuNBv40AFeSORQsdd6JfZAwHp');
            background-size: cover; background-position: center;
        }
        .overlay { background-color: rgba(62, 39, 35, 0.7); }
        .content-section { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-krem text-cokelat-900 h-screen overflow-hidden">

    <!-- WELCOME SCREEN -->
    <div id="welcome-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-welcome">
        <div class="absolute inset-0 overlay"></div>
        <div class="relative z-10 text-center text-white px-4">
            <img src="https://drive.google.com/uc?export=view&id=1H1JqgBcdkbUg0rmO022wDCospnxkDArF" alt="Logo" class="w-24 h-24 mx-auto mb-4 rounded-full shadow-lg border-4 border-krem">
            <h1 class="text-4xl md:text-6xl font-bold mb-2">Selamat Datang</h1>
            <p class="text-lg md:text-xl mb-8">di Hanjitur Dashboard</p>
            <button onclick="masukApp()" class="bg-krem text-cokelat-900 px-8 py-3 rounded-full font-semibold hover:bg-white transition shadow-lg">
                Masuk Sekarang <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="app-wrapper" class="hidden flex h-full">
        
        <!-- SIDEBAR -->
        <div id="sidebar" class="fixed md:relative z-40 inset-y-0 left-0 w-64 bg-cokelat-900 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl">
            <div class="flex items-center justify-between p-4 border-b border-cokelat-700">
                <div class="text-xl font-bold flex items-center">
                    <i class="fas fa-heart text-krem mr-2"></i> Hanjitur
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-krem text-2xl"><i class="fas fa-times"></i></button>
            </div>
            <nav class="p-4 space-y-2">
                <a href="javascript:void(0)" onclick="showSection('dashboard')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-home w-6"></i> Dashboard</a>
                <a href="javascript:void(0)" onclick="showSection('pernikahan')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-ring w-6"></i> Pernikahan</a>
                <a href="javascript:void(0)" onclick="showSection('keuangan')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-wallet w-6"></i> Keuangan</a>
                <a href="javascript:void(0)" onclick="showSection('logistik')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-box w-6"></i> Logistik</a>
                <a href="javascript:void(0)" onclick="showSection('maintenance')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-tools w-6"></i> Maintenance</a>
                <a href="javascript:void(0)" onclick="showSection('arsip')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-folder-open w-6"></i> Arsip</a>
                <a href="javascript:void(0)" onclick="showSection('catatan')" class="nav-link block py-2.5 px-4 rounded hover:bg-cokelat-700 transition"><i class="fas fa-sticky-note w-6"></i> Catatan</a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col h-full overflow-hidden">
            <!-- HEADER -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center z-30">
                <button onclick="toggleSidebar()" class="text-cokelat-900 text-2xl md:hidden"><i class="fas fa-bars"></i></button>
                <div class="font-semibold text-lg" id="header-title">Dashboard</div>
                <div id="current-date" class="text-sm text-gray-500 hidden md:block"></div>
            </header>

            <!-- MAIN CONTENT -->
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-krem p-4 md:p-6">
                
                <div id="loader" class="hidden text-center py-10">
                    <i class="fas fa-spinner fa-spin text-4xl text-cokelat-500"></i>
                </div>

                <!-- SECTION: DASHBOARD -->
                <section id="section-dashboard" class="content-section">
                    <div class="bg-white rounded-lg shadow p-6 border-t-4 border-cokelat-500 mb-6">
                        <h2 class="text-2xl font-bold mb-2">Halo, Pasangan Bahagia! ❤️</h2>
                        <p id="dashboard-date-info" class="text-gray-600 mb-4"></p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="bg-krem p-4 rounded-lg shadow-sm border border-cokelat-500/20">
                                <h3 class="font-bold text-cokelat-700"><i class="fas fa-calendar-alt"></i> Menuju Pernikahan</h3>
                                <p id="widget-h-min" class="text-2xl mt-2 font-bold text-cokelat-900">- Hari Lagi</p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- SECTION: PERNIKAHAN -->
                <section id="section-pernikahan" class="content-section hidden">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <button onclick="switchSubMenu('pernikahan', 'wedding_todo')" class="sub-pernikahan active-sub bg-cokelat-700 text-white px-4 py-2 rounded-full text-sm">Daftar Tugas</button>
                        <button onclick="switchSubMenu('pernikahan', 'wedding_budget')" class="sub-pernikahan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Anggaran</button>
                        <button onclick="switchSubMenu('pernikahan', 'wedding_vendors')" class="sub-pernikahan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Vendor</button>
                        <button onclick="switchSubMenu('pernikahan', 'wedding_guests')" class="sub-pernikahan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Tamu</button>
                    </div>
                    <div class="bg-white rounded-lg shadow overflow-hidden p-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 id="table-title-pernikahan" class="font-bold uppercase text-sm tracking-widest">Daftar Tugas</h3>
                            <button onclick="bukaModalForm()" class="bg-cokelat-500 text-white px-3 py-1 rounded text-xs"><i class="fas fa-plus"></i> Tambah Data</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead id="thead-pernikahan" class="bg-cokelat-700 text-white text-xs uppercase"></thead>
                                <tbody id="tbody-pernikahan" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- SECTION: KEUANGAN -->
                <section id="section-keuangan" class="content-section hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="bg-white p-4 rounded-lg shadow border-l-4 border-green-500">
                            <p class="text-xs text-gray-500 font-bold uppercase">Total Pemasukan</p>
                            <h3 id="info-pemasukan" class="text-lg font-bold">Rp 0</h3>
                        </div>
                        <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500">
                            <p class="text-xs text-gray-500 font-bold uppercase">Total Pengeluaran</p>
                            <h3 id="info-pengeluaran" class="text-lg font-bold">Rp 0</h3>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-4">
                        <button onclick="switchSubMenu('keuangan', 'keuangan_aruskas')" class="sub-keuangan active-sub bg-cokelat-700 text-white px-4 py-2 rounded-full text-sm">Arus Kas</button>
                        <button onclick="switchSubMenu('keuangan', 'keuangan_tagihan')" class="sub-keuangan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Tagihan</button>
                        <button onclick="switchSubMenu('keuangan', 'keuangan_budget')" class="sub-keuangan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Budget</button>
                        <button onclick="switchSubMenu('keuangan', 'keuangan_tabungan')" class="sub-keuangan bg-white px-4 py-2 rounded-full text-sm border border-cokelat-500">Tabungan</button>
                    </div>
                    <div class="bg-white rounded-lg shadow p-4 overflow-x-auto">
                        <table class="w-full text-left">
                            <thead id="thead-keuangan" class="bg-gray-100 text-xs uppercase"></thead>
                            <tbody id="tbody-keuangan" class="text-sm"></tbody>
                        </table>
                    </div>
                </section>

                <!-- SECTION: LOGISTIK / MAINTENANCE / ARSIP (Generic Table) -->
                <section id="section-generic" class="content-section hidden">
                    <div class="bg-white rounded-lg shadow p-4">
                        <div class="flex justify-between items-center mb-4 border-b pb-2">
                            <h2 id="generic-title" class="font-bold">Data</h2>
                            <button onclick="bukaModalForm()" class="bg-cokelat-700 text-white px-3 py-1 rounded text-xs">Tambah</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead id="thead-generic" class="bg-cokelat-900 text-white text-xs uppercase"></thead>
                                <tbody id="tbody-generic" class="text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- SECTION: CATATAN -->
                <section id="section-catatan" class="content-section hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Catatan Kecil</h2>
                        <button onclick="bukaModalCatatan()" class="bg-cokelat-500 text-white px-4 py-2 rounded-full shadow hover:bg-cokelat-700 transition">
                            <i class="fas fa-pen-nib"></i> Tulis Baru
                        </button>
                    </div>
                    <div id="catatan-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </section>

            </main>
        </div>
    </div>

    <!-- MODAL FORM DINAMIS (Untuk Semua Tabel) -->
    <div id="modal-form" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-cokelat-900 p-4 text-white flex justify-between items-center">
                <h3 id="modal-form-title" class="font-bold uppercase tracking-widest text-sm">Input Data</h3>
                <button onclick="tutupModal('modal-form')"><i class="fas fa-times"></i></button>
            </div>
            <form id="dynamic-form" onsubmit="simpanDataDinamis(event)" class="p-6 space-y-4">
                <div id="form-fields" class="max-h-96 overflow-y-auto pr-2">
                    <!-- Fields generated by JS -->
                </div>
                <button type="submit" class="w-full bg-cokelat-700 text-white py-3 rounded-lg font-bold hover:bg-cokelat-900 transition">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <!-- MODAL CATATAN -->
    <div id="modal-catatan" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold mb-4 text-cokelat-900 border-b pb-2">Catatan Baru</h3>
            <form id="form-catatan" onsubmit="simpanCatatan(event)" class="space-y-4">
                <input type="hidden" id="catatan-id">
                <input type="text" id="catatan-judul" placeholder="Judul..." required class="w-full border-2 border-krem p-3 rounded-lg focus:border-cokelat-500 outline-none">
                <textarea id="catatan-isi" rows="5" placeholder="Tulis sesuatu..." required class="w-full border-2 border-krem p-3 rounded-lg focus:border-cokelat-500 outline-none"></textarea>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="tutupModal('modal-catatan')" class="px-4 py-2 text-gray-500">Batal</button>
                    <button type="submit" class="bg-cokelat-700 text-white px-6 py-2 rounded-lg font-bold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw5CqINqjAGpxD8BWTzLcGhmmC6aifJ95kBDBsX87rBoaDMa7QOuN1TZhHqU7zUyMyg/exec';
        const WEDDING_DATE = '2027-08-01'; // Contoh: '2024-12-25'
        
        let currentSheet = '';
        let currentSection = 'dashboard';

        // Initialization
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', dateOptions);

        function masukApp() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-wrapper').classList.remove('hidden');
            updateDashboardWidgets();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function tutupModal(id) { document.getElementById(id).classList.add('hidden'); }

        function showLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

        function showSection(sectionId) {
            currentSection = sectionId;
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.add('hidden'));
            
            let targetSection = sectionId;
            if(['logistik', 'maintenance', 'arsip'].includes(sectionId)) {
                targetSection = 'generic';
                document.getElementById('generic-title').innerText = sectionId.toUpperCase();
                loadDataTable(sectionId.charAt(0).toUpperCase() + sectionId.slice(1), 'generic');
            } else if(sectionId === 'pernikahan') {
                switchSubMenu('pernikahan', 'wedding_todo');
            } else if(sectionId === 'keuangan') {
                switchSubMenu('keuangan', 'keuangan_aruskas');
            } else if(sectionId === 'catatan') {
                loadCatatan();
            } else {
                updateDashboardWidgets();
            }

            document.getElementById('section-' + targetSection).classList.remove('hidden');
            document.getElementById('header-title').innerText = sectionId.toUpperCase();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function switchSubMenu(parent, sheetName) {
            currentSheet = sheetName;
            document.querySelectorAll(`.sub-${parent}`).forEach(btn => {
                btn.classList.remove('bg-cokelat-700', 'text-white');
                btn.classList.add('bg-white', 'text-cokelat-900');
            });
            event.target.classList.add('bg-cokelat-700', 'text-white');
            loadDataTable(sheetName, parent);
        }

        // TABLE LOGIC
        function loadDataTable(sheetName, uiType) {
            currentSheet = sheetName;
            showLoader(true);
            const thead = document.getElementById(`thead-${uiType}`);
            const tbody = document.getElementById(`tbody-${uiType}`);
            thead.innerHTML = ''; tbody.innerHTML = '';

            fetch(`${GAS_URL}?action=read&sheetName=${sheetName}`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'success' && res.data.length > 0) {
                        const headers = Object.keys(res.data[0]);
                        let headRow = '<tr>';
                        headers.forEach(h => { if(h !== 'ID') headRow += `<th class="p-3 border-b">${h}</th>` });
                        headRow += '<th class="p-3 border-b text-center">Aksi</th></tr>';
                        thead.innerHTML = headRow;

                        res.data.forEach(item => {
                            let row = `<tr class="hover:bg-cokelat-50 border-b">`;
                            headers.forEach(h => { if(h !== 'ID') row += `<td class="p-3">${item[h] || '-'}</td>` });
                            row += `<td class="p-3 text-center text-red-500"><button onclick="hapusData('${sheetName}', '${item.ID}', () => loadDataTable('${sheetName}', '${uiType}'))"><i class="fas fa-trash"></i></button></td></tr>`;
                            tbody.innerHTML += row;
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="10" class="text-center p-10">Belum ada data di sheet ini.</td></tr>';
                    }
                })
                .finally(() => showLoader(false));
        }

        // MODAL FORM DYNAMIC
        function bukaModalForm() {
            const fields = document.getElementById('form-fields');
            fields.innerHTML = '<p class="text-center">Memuat kolom...</p>';
            document.getElementById('modal-form').classList.remove('hidden');

            fetch(`${GAS_URL}?action=read&sheetName=${currentSheet}`)
                .then(res => res.json())
                .then(res => {
                    fields.innerHTML = '';
                    const sample = res.data[0] || {};
                    // Jika data kosong, panggil header dari sheet bisa lambat, kita asumsikan dari struktur sheet yang anda berikan di prompt sebelumnya
                    // Untuk kemudahan, kita ambil keys dari data yang ada
                    const headers = Object.keys(sample).filter(k => k !== 'ID');
                    
                    headers.forEach(h => {
                        fields.innerHTML += `
                            <div>
                                <label class="block text-xs font-bold text-cokelat-700 mb-1 uppercase">${h}</label>
                                <input type="text" name="${h}" class="w-full border-b-2 border-krem p-2 outline-none focus:border-cokelat-500" placeholder="Input ${h}...">
                            </div>`;
                    });
                });
        }

        function simpanDataDinamis(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {};
            formData.forEach((val, key) => data[key] = val);

            showLoader(true);
            tutupModal('modal-form');

            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'create', sheetName: currentSheet, data: data })
            }).then(() => {
                alert('Data berhasil disimpan!');
                showSection(currentSection);
            });
        }

        // CATATAN LOGIC
        function loadCatatan() {
            showLoader(true);
            const container = document.getElementById('catatan-container');
            container.innerHTML = '';
            fetch(`${GAS_URL}?action=read&sheetName=Catatan`)
                .then(res => res.json()).then(res => {
                    res.data.forEach(item => {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-cokelat-500 group relative">
                                <h3 class="font-bold text-lg mb-2">${item.Judul}</h3>
                                <p class="text-sm text-gray-500 line-clamp-4">${item.Isi}</p>
                                <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition">
                                    <button onclick="hapusData('Catatan', '${item.ID}', loadCatatan)" class="text-red-400"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>`;
                    });
                }).finally(() => showLoader(false));
        }

        function bukaModalCatatan() {
            document.getElementById('form-catatan').reset();
            document.getElementById('modal-catatan').classList.remove('hidden');
        }

        function simpanCatatan(e) {
            e.preventDefault();
            const data = {
                Judul: document.getElementById('catatan-judul').value,
                Isi: document.getElementById('catatan-isi').value,
                Tanggal: new Date().toLocaleDateString('id-ID')
            };
            tutupModal('modal-catatan');
            showLoader(true);
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'create', sheetName: 'Catatan', data: data })
            }).then(() => loadCatatan());
        }

        function hapusData(sheet, id, callback) {
            if(!confirm('Hapus data ini?')) return;
            showLoader(true);
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', sheetName: sheet, id: id })
            }).then(() => callback());
        }

        function updateDashboardWidgets() {
            const hMin = Math.ceil((new Date(WEDDING_DATE) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('widget-h-min').innerText = hMin > 0 ? `${hMin} Hari Lagi` : 'Selamat Hari Pernikahan!';
        }
    </script>
</body>
</html>
